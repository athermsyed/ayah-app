<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body { background:#03060f; }
  @media (prefers-reduced-motion: reduce) { * { animation-duration:.001ms !important; animation-iteration-count:1 !important; } }
  @keyframes ayahGlowPulse { 0%,100% { opacity:.5; transform:translate(-50%,-50%) scale(1);} 50% { opacity:.82; transform:translate(-50%,-50%) scale(1.08);} }
  @keyframes ayahShimmer { 0% { background-position:-160% 0;} 100% { background-position:260% 0;} }
  @keyframes ayahDeco { 0%,100% { transform:translateY(0) rotate(var(--r,0deg)); } 50% { transform:translateY(-9px) rotate(var(--r,0deg)); } }
  @keyframes ayFade { from { opacity:0; transform:translateY(12px);} to { opacity:1; transform:none;} }
  @keyframes ayPulse { 0%,100%{opacity:.3} 50%{opacity:.8} }
  @keyframes ayShake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-7px)} 60%{transform:translateX(7px)} 80%{transform:translateX(-3px)} }
  @keyframes ayWordGlow { 0%,100%{text-shadow:0 0 28px rgba(232,201,138,.6),0 0 60px rgba(232,201,138,.2)} 50%{text-shadow:0 0 52px rgba(232,201,138,1),0 0 120px rgba(232,201,138,.45)} }
  .ay-scroll::-webkit-scrollbar { width:0; }
  .ay-fade { animation: ayFade .42s cubic-bezier(.16,1,.3,1) both; }
  .ay-cta { width:100%; font-family:'Cormorant Garamond',serif; font-size:19px; font-weight:600; letter-spacing:.02em; padding:15px; border:1px solid #b9913f; border-radius:12px; cursor:pointer; color:#1a1206; background:linear-gradient(180deg,#fbeeb8,#d8b45c 55%,#c79b40); box-shadow:0 8px 24px rgba(216,180,92,.28); position:relative; overflow:hidden; transition:transform .12s; }
  .ay-cta:active { transform:scale(.98); }
  .ay-cta .sh { position:absolute; inset:0; background:linear-gradient(105deg,transparent 30%,rgba(255,255,255,.6) 50%,transparent 70%); background-size:220% 100%; animation:ayahShimmer 3.6s ease-in-out infinite; }
  .ay-ghost { width:100%; font-family:'Cormorant Garamond',serif; font-size:18px; font-weight:500; padding:14px; border:1px solid rgba(216,180,92,.55); border-radius:12px; cursor:pointer; color:#eccb73; background:rgba(8,16,42,.35); transition:transform .12s,background .2s; }

  .ay-ghost:hover { background:rgba(216,180,92,.1); }

  .spk:active { transform:scale(.9); }
  .spk.playing { background:rgba(216,180,92,.25); animation:ayPulse 1s ease-in-out infinite; }
  .wordhi { color:#fbeeb8; text-shadow:0 0 22px rgba(231,194,108,.85); border-bottom:2px solid rgba(231,194,108,.5); }
  /* ===== Root Word (Linguistic Depth) reveal — from Root word.html ===== */
  @keyframes ayRootGlow { 0%,100%{text-shadow:0 0 14px rgba(231,194,108,.45)} 50%{text-shadow:0 0 30px rgba(231,194,108,.95),0 0 56px rgba(231,194,108,.35)} }
  @keyframes ayRootPop { 0%{opacity:0;transform:translateY(16px) scale(.34)} 62%{opacity:1;transform:translateY(-3px) scale(1.12)} 100%{opacity:1;transform:translateY(0) scale(1)} }
  .rl { display:inline-block; will-change:transform,opacity; }
  /* ===== Character guide system — from Quranic memorization character integration ===== */
  .ayg-host { position:absolute; width:clamp(120px,40vw,168px); height:clamp(120px,40vw,168px); pointer-events:none; z-index:52; }
  .ayg      { position:relative; width:100%; height:100%; will-change:transform; }
  .ayg-enter   { position:absolute; inset:0; }
  .ayg-react   { position:absolute; inset:0; }
  .ayg-float   { position:absolute; inset:0; animation:aygFloat 4.6s ease-in-out infinite; }
  .ayg-sway    { position:absolute; inset:0; animation:aygSway 6.4s ease-in-out infinite; transform-origin:50% 85%; }
  .ayg-breathe { position:absolute; inset:0; animation:aygBreathe 3.8s ease-in-out infinite; transform-origin:50% 82%; }
  .ayg-pad     { position:absolute; inset:15%; }
  .ayg-img     { width:100%; height:100%; object-fit:contain; display:block;
                 filter:drop-shadow(0 8px 14px rgba(0,0,0,.45)); transition:filter .45s ease; }
  .ayg-halo    { position:absolute; left:50%; top:46%; width:140%; height:140%; transform:translate(-50%,-50%);
                 border-radius:50%; pointer-events:none; opacity:0; transition:opacity .5s ease;
                 background:radial-gradient(circle, rgba(231,194,108,.36) 0%, rgba(231,194,108,.10) 42%, rgba(231,194,108,0) 68%); }
  .ayg.is-happy .ayg-halo { opacity:1; animation:aygHalo 2.4s ease-in-out infinite; }
  .ayg-eye { position:absolute; border-radius:50%; transform:scaleY(0); transform-origin:50% 0%;
             transition:transform .09s ease; pointer-events:none; }
  .ayg-eye.blink { transform:scaleY(1); }
  .ayg.is-sad .ayg-float   { animation:aygFloatSad 5.6s ease-in-out infinite; }
  .ayg.is-sad .ayg-sway    { animation:aygSadShake 3s ease-in-out infinite; }
  .ayg.is-sad .ayg-breathe { animation:aygBreathe 5.2s ease-in-out infinite; }
  .ayg.is-sad .ayg-img     { filter:drop-shadow(0 6px 12px rgba(0,0,0,.5)) saturate(.5) brightness(.82); }
  .ayg.is-sad.has-sadart .ayg-img { filter:drop-shadow(0 6px 12px rgba(0,0,0,.5)); }
  .ayg-react.cheer { animation:aygCheer .92s cubic-bezier(.22,1.2,.36,1); }
  .ayg-react.droop { animation:aygDroop .7s cubic-bezier(.3,0,.35,1) forwards; }
  .ayg.ent-swoop .ayg-enter { animation:aygEntSwoop .82s cubic-bezier(.18,1,.32,1) both; }
  .ayg.ent-glide .ayg-enter { animation:aygEntGlide .9s  cubic-bezier(.2,.9,.3,1)   both; }
  .ayg.ent-drop  .ayg-enter { animation:aygEntDrop  .92s cubic-bezier(.3,1.1,.4,1)  both; }
  .ayg.ent-dash  .ayg-enter { animation:aygEntDash  .7s  cubic-bezier(.16,1.1,.3,1) both; }
  .ayg.ent-rise  .ayg-enter { animation:aygEntRise  .86s cubic-bezier(.2,1.1,.34,1) both; }
  .ayg.ent-bloom .ayg-enter { animation:aygEntBloom .82s cubic-bezier(.2,1.2,.36,1) both; }
  .ayg.ent-moon  .ayg-enter { animation:aygEntMoon  .9s  cubic-bezier(.2,.95,.32,1) both; }
  .ayg-spark { position:absolute; width:10px; height:10px; pointer-events:none; opacity:0;
               background:radial-gradient(circle, #fff 0%, #fbeeb8 38%, rgba(231,194,108,0) 72%); border-radius:50%;
               animation:aygSpark .9s ease-out forwards; }
  @keyframes aygFloat    { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
  @keyframes aygFloatSad { 0%,100%{transform:translateY(6px)} 50%{transform:translateY(9px)} }
  @keyframes aygSway     { 0%,100%{transform:rotate(-3.2deg)} 50%{transform:rotate(3.2deg)} }
  @keyframes aygBreathe  { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
  @keyframes aygHalo     { 0%,100%{opacity:.55; transform:translate(-50%,-50%) scale(1)} 50%{opacity:.95; transform:translate(-50%,-50%) scale(1.07)} }
  @keyframes aygCheer    { 0%{transform:translateY(0) scale(1) rotate(0)} 18%{transform:translateY(-18px) scale(1.12) rotate(-7deg)} 38%{transform:translateY(0) scale(1)} 56%{transform:translateY(-11px) rotate(7deg)} 72%{transform:translateY(0) scale(1.05)} 86%{transform:translateY(-3px) rotate(-2deg)} 100%{transform:translateY(0) scale(1) rotate(0)} }
  @keyframes aygDroop    { 0%{transform:translateY(0) rotate(0)} 45%{transform:translateY(9px) rotate(-8deg)} 70%{transform:translateY(6px) rotate(-3deg)} 100%{transform:translateY(7px) rotate(-6deg)} }
  @keyframes aygSadShake { 0%,100%{transform:rotate(-6deg)} 50%{transform:rotate(-1deg)} }
  @keyframes aygSpark    { 0%{opacity:0; transform:translate(0,0) scale(.3)} 22%{opacity:1} 100%{opacity:0; transform:translate(var(--dx,0),var(--dy,-26px)) scale(1.1)} }
  @keyframes aygEntSwoop { 0%{opacity:0; transform:translate(96px,-78px) rotate(40deg) scale(.45)} 55%{opacity:1; transform:translate(-9px,7px) rotate(-9deg) scale(1.08)} 78%{transform:translate(4px,-3px) rotate(4deg) scale(.97)} 100%{opacity:1; transform:translate(0,0) rotate(0) scale(1)} }
  @keyframes aygEntGlide { 0%{opacity:0; transform:translateX(120px) scale(.92)} 60%{opacity:1; transform:translateX(-7px) scale(1.02)} 100%{opacity:1; transform:translateX(0) scale(1)} }
  @keyframes aygEntDrop  { 0%{opacity:0; transform:translateY(-112px) rotate(-14deg)} 48%{opacity:1; transform:translateY(9px) rotate(9deg)} 68%{transform:translateY(-5px) rotate(-6deg)} 84%{transform:translateY(3px) rotate(3deg)} 100%{transform:translateY(0) rotate(0)} }
  @keyframes aygEntDash  { 0%{opacity:0; transform:translateX(128px) skewX(-9deg) scale(.95)} 55%{opacity:1} 74%{transform:translateX(-11px) skewX(5deg)} 100%{opacity:1; transform:translateX(0) skewX(0) scale(1)} }
  @keyframes aygEntRise  { 0%{opacity:0; transform:translateY(98px) scale(.66)} 55%{opacity:1; transform:translateY(-9px) scale(1.07)} 78%{transform:translateY(5px) scale(.98)} 100%{opacity:1; transform:translateY(0) scale(1)} }
  @keyframes aygEntBloom { 0%{opacity:0; transform:scale(.18) rotate(-95deg)} 60%{opacity:1; transform:scale(1.13) rotate(11deg)} 80%{transform:scale(.95) rotate(-5deg)} 100%{opacity:1; transform:scale(1) rotate(0)} }
  @keyframes aygEntMoon  { 0%{opacity:0; transform:translate(78px,80px) rotate(22deg) scale(.66)} 60%{opacity:1; transform:translate(-7px,-7px) rotate(-6deg) scale(1.05)} 100%{opacity:1; transform:translate(0,0) rotate(0) scale(1)} }
  @media (prefers-reduced-motion: reduce){
    .ayg-float,.ayg-sway,.ayg-breathe,.ayg.is-happy .ayg-halo,.ayg-react.cheer,.ayg-react.droop,.ayg-enter { animation:none !important; }
    .ayg-spark { display:none !important; }
  }

App.prototype.fetchVerse = function(s,v){

// Resolve a real verse that contains w as a whole word, preferring a SHORT verse so
// the ayah is easy to read and the learned word is easy to spot. The matched word's

App.prototype.verseLen = function(v){ return (v && v.words) ? v.words.length : 99; };
App.prototype.bestVerse = function(w){
  var self=this;

  var SHORT_MAX=10, MIN_LEN=3;
  var useRep=function(){
    return self.fetchVerse(w.s,w.v).then(function(v){
      var idx=self.findWordIndex(v,w.a);
      return (idx>=0) ? {verse:v, idx:idx} : null;
    }).catch(function(){ return null; });
  };
  var p = useRep().then(function(rep){
    if (rep && self.verseLen(rep.verse)<=SHORT_MAX) return rep;
    // Look for a shorter verse that contains the exact word form.
    var q=encodeURIComponent(stripDia(w.a));
    return fetch(API+"/search?q="+q+"&size=15&page=0").then(function(r){ if(!r.ok) throw 0; return r.json(); }).then(function(j){
      var results=(j.search && j.search.results) || [];
      var cands=[];
      results.forEach(function(rs){
        var toks=(rs.words||[]).filter(function(x){ return x.char_type!=='end'; });
        var exact=false, loose=false;
        for (var i=0;i<toks.length;i++){
          if (toks[i].text===w.a){ exact=true; break; }
          if (stripDia(toks[i].text)===stripDia(w.a)) loose=true;
        }

      });

      cands=cands.filter(function(c){ return c.len>=MIN_LEN; }).sort(function(a,b){ return (b.exact-a.exact) || (a.len-b.len); });

      return self.fetchVerse(s,v).then(function(vv){
        var idx=self.exactWordIndex(vv,w.a);
        return (idx>=0) ? {verse:vv, idx:idx} : rep;
      }).catch(function(){ return rep; });
    }).catch(function(){ return rep; });
  }).then(function(res){ if(res) w._bv=res; w._bvP=null; return res; });
  w._bvP=p; return p;
};

function pad3(n){ n=String(n); return n.length>=3?n:('000'+n).slice(-3); }
App.prototype.findWordIndex = function(verse, targetAr){
  // Exact (diacritic-insensitive) whole-word match only. A loose prefix match used
  // to return the wrong word, which is why some audio clips did not match the word.
  if (!verse || !verse.words) return -1;
  var t = stripDia(targetAr);
  for (var i=0;i<verse.words.length;i++){ if (stripDia(verse.words[i].ar)===t){ return i; } }
  return -1;
};
App.prototype.exactWordIndex = function(verse, targetAr){
  // Prefer the exact vowelled form so the chosen word's audio matches the taught form;
  // fall back to the diacritic-insensitive match otherwise.
  if (!verse || !verse.words) return -1;
  for (var i=0;i<verse.words.length;i++){ if (verse.words[i].ar===targetAr){ return i; } }
  return this.findWordIndex(verse, targetAr);
};
App.prototype.wordAudio = function(w, verse){
  // Only ever return the verse's own authoritative per-word audio_url for an exact
  // match. Never build a URL from the word position: Quran.com audio file numbers do
  // not equal word positions, so that produced the wrong recitation.
  if (verse){ var i=this.findWordIndex(verse, w.a); if (i>=0 && verse.words[i].audio) return verse.words[i].audio; }
  return null;
};

App.prototype.setProgress = function(){
  var total=this.lwords.length*((this.STAGES&&this.STAGES.length)||1);
  var remaining=this.queue.filter(function(q){return !q.isRetry;}).length;
  var pct;
  if (this.lphase==='learn') pct=((total-remaining)/total)*58;
  else if (this.lphase==='pairs') pct=62;
  else if (this.lphase==='ayah') pct=68;
  else if (this.lphase==='build') pct=72;
  else if (this.lphase==='fill') pct=76+(this.fillIdx/Math.max(1,this.fills?this.fills.length:1))*6;
  else if (this.lphase==='mastercheck') pct=84+(Object.keys(this.mcDone||{}).length/Math.max(1,this.mcTotal||1))*10;
  else if (this.lphase==='summary') pct=97;
  else pct=100;
  var f=this.q('#lnFill'); if(f) f.style.width=Math.min(100,Math.max(0,pct))+'%';
  var c=this.q('#lnCount'); if(c) c.textContent=this.lphase==='learn'?this.learned+'/'+this.lwords.length:(this.lphase==='done'?'✓':'•');
};

App.prototype.next = function(){
  if (this.lphase==='learn') return this.runQueued();
  if (this.lphase==='pairs') return this.runPairs();
  if (this.lphase==='ayah') return this.runAyah();
  if (this.lphase==='build') return this.runBuild();
  if (this.lphase==='fill') return this.runFill();
  if (this.lphase==='mastercheck') return this.runMasterCheck();
  if (this.lphase==='summary') return this.runSummary();

};
App.prototype.runQueued = function(){
  if (this.screen!=='learn') return;

  var rb = item.isRetry ? '<div style="width:100%;max-width:340px;background:rgba(216,180,92,.08);border:1px solid rgba(216,180,92,.25);border-radius:10px;padding:8px 14px;font-family:Poppins;font-size:12px;color:#eccb73;text-align:center;margin-bottom:12px;">&#8617; Reviewing <span style="font-family:\'Scheherazade New\',serif;font-size:18px;">'+w.a+'</span></div>' : '';

  if (item.stage==='recall') return this.scRecall(w,rb);

App.prototype.scheduleRetry = function(wi){
  this.queue=this.queue.filter(function(q){ return !(q.wi===wi && q.isRetry); });
  var at=Math.min(this.queue.length, 2+Math.floor(Math.random()*2));

App.prototype.afterCorrect = function(wi){
  if (this.screen!=='learn') return;
  var w=this.lwords[wi];
  this.sessionCorrect++;
  var remaining=this.queue.filter(function(q){ return q.wi===wi && !q.isRetry; });
  if (remaining.length===0){
    var self=this;
    // Each word is counted and celebrated at most once per lesson. A re-queued retry
    // that is later answered correctly is a review, not a new completion, so the
    // "learned" count can never exceed the number of words in the lesson.
    if (this._learnedWi && this._learnedWi[wi]) return this.next();
    (this._learnedWi=this._learnedWi||{})[wi]=true;

};

// ---- ayah context, the "you can understand this now" moment ----
App.prototype.runAyah = function(){

    }).join(' ');

    var headline = allKnown ? 'You can now understand this full ayah' : 'You can now partially understand this ayah';

App.prototype.burstAt = function(cx,cy,n,spread,omni){

App.prototype.spawnRise = function(){
  var btn=this.view && this.view.querySelector('.r-cta1'); if(!btn||!this.crect) return;
  var b=btn.getBoundingClientRect(); var x0=b.left-this.crect.left, y0=b.top-this.crect.top;
  var k=1+(Math.random()<.55?1:0);
  for (var i=0;i<k;i++){ var rise=-(.9+Math.random()*.5);
    this.parts.push({kind:'rletter',glyph:GLYPHS[Math.floor(Math.random()*GLYPHS.length)],x:x0+Math.random()*b.width,y:y0+2+Math.random()*4,vy:rise,sway:.3+Math.random()*.5,phase:Math.random()*6.28,size:17+Math.random()*9,dot:1.6+Math.random()*1.2,rot:(Math.random()-.5)*26,vr:(Math.random()-.5)*.7,age:0,shrink:30+Math.random()*22,alpha:0,amax:.85+Math.random()*.15,fading:false}); }

App.prototype.loop = function(){
  var ctx=this.ctx; if(!ctx){ return; } ctx.clearRect(0,0,this.cw,this.ch);
  if (this.riseOn){ this.riseAcc++; if(this.riseAcc>6){ this.riseAcc=0; this.spawnRise(); } }
  var dots=0, self=this;
  for (var i=this.parts.length-1;i>=0;i--){ var p=this.parts[i];
    if (p.kind==='letter'){ p.vx*=.975; p.vy=p.vy*.975+.035; p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr; p.age++;
      if (p.age>p.shrink){ p.size+=(p.dot-p.size)*.07; if(p.size<=p.dot+.5){ p.kind='dot'; p.glyph=null; p.size=p.dot; p.vx=(Math.random()-.5)*.3; p.vy=-.05-Math.random()*.12; p.alpha=p.amax=.45+Math.random()*.35; } } }
    else if (p.kind==='rletter'){ p.phase+=.05; p.age++; p.y+=p.vy; p.x+=Math.sin(p.phase)*p.sway; p.rot+=p.vr;
      if (!p.fading&&p.alpha<p.amax) p.alpha=Math.min(p.amax,p.alpha+.07);
      if (p.glyph&&p.age>p.shrink){ p.size+=(p.dot-p.size)*.08; if(p.size<=p.dot+.5){ p.glyph=null; p.size=p.dot; } }
      if (p.y<this.ch*.24){ p.fading=true; p.alpha-=.018; }
      if (p.alpha<=0||p.y<8||p.size<.4){ this.parts.splice(i,1); continue; } }
    else if (p.kind==='dot'){ dots++; p.phase+=.02; p.x+=p.vx+Math.sin(p.phase)*.16; p.y+=p.vy; if(p.y<-12){ p.y=this.ch+12; p.x=Math.random()*this.cw; } if(p.x<-12)p.x=this.cw+12; if(p.x>this.cw+12)p.x=-12; }
    this.drawPart(ctx,p);
  }
  if (dots>40){ for(var j=0;j<this.parts.length&&dots>40;j++){ if(this.parts[j].kind==='dot'){ this.parts.splice(j,1); dots--; j--; } } }

};
App.prototype.drawPart = function(ctx,p){
  if (p.glyph){ var fl=p.alpha*(.7+.3*Math.sin(p.phase)); ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot*Math.PI/180); ctx.font=p.size.toFixed(1)+"px 'Scheherazade New', serif"; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.shadowColor='rgba(231,194,108,.9)'; ctx.shadowBlur=8; ctx.fillStyle='rgba(245,224,160,'+Math.max(0,fl)+')'; ctx.fillText(p.glyph,0,0); ctx.restore(); }
  else { var fl2=p.kind==='dot'?p.alpha*(.55+.45*Math.sin(p.phase*1.7)):p.alpha; ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,6.2832); ctx.fillStyle='rgba(245,224,160,'+Math.max(0,fl2)+')'; ctx.shadowColor='rgba(231,194,108,.95)'; ctx.shadowBlur=7; ctx.fill(); }
  ctx.shadowBlur=0;
};

function normAns(s){ return String(s||'').toLowerCase().replace(/[^a-z\s]/g,' ').replace(/\s+/g,' ').trim(); }

App.prototype.learnedPool = function(){
  var self=this;

};
App.prototype.lessonsCompletedCount = function(){ var n=0,k; for (k in this.data.lessonsDone){ if(this.data.lessonsDone[k]) n++; } return n; };
App.prototype.matchMeaning = function(input, meaning){
  var inp=normAns(input); if(!inp) return false;
  var alts=String(meaning).split('/').map(function(a){ return normAns(a); });
  var exp=[];
  alts.forEach(function(a){ if(a) exp.push(a); var b=a.replace(/^(the|a|an|to|and)\s+/,''); if(b&&b!==a) exp.push(b); });
  for (var i=0;i<exp.length;i++){ var e=exp[i]; if(!e) continue;
    if (inp===e) return true;
    if (inp.length>=3 && e.indexOf(inp)>=0) return true;
    if (e.length>=3 && inp.indexOf(e)>=0) return true;
  }
  return false;
};
App.prototype.engOptions = function(w, n){
  var pool=this.learnedPool().filter(function(x){ return x.e!==w.e; });
  if (pool.length<n) pool=pool.concat(VOCAB.filter(function(x){ return x.e!==w.e; }));
  var seen={}, uniq=[];
  shuffle(pool).forEach(function(x){ if(!seen[x.e]){ seen[x.e]=1; uniq.push(x); } });
  var picks=uniq.slice(0,n).map(function(x){ return x.e; });
  return shuffle([w.e].concat(picks));
};

        +'<div style="font-family:Poppins;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:rgba(243,233,207,.45);margin-bottom:10px;">Build the verse from its words</div>'

        +'<div style="display:flex;gap:10px;margin-top:6px;width:100%;max-width:300px;">'

        +'</div></div>', 'Build the sentence');
      $all('.btile', self.view).forEach(function(b){ b.onclick=function(){ placed.push(+b.dataset.i); render(); }; });

        var ok = placed.length===order.length && placed.every(function(v,i){ return v===order[i]; });
        if(ok){ fb.style.color='#78d9a0'; fb.textContent='Correct order'; self.comboHit(true); setTimeout(function(){ self.lphase='fill'; self.buildFills().then(function(){ self.next(); }); }, 800); }
        else { fb.style.color='#cc8a8a'; fb.textContent='Not quite. Tap Reset and try again.'; self.comboHit(false); }
      };
    }
    render();
  });
};

// ---- session summary with a goal nudge ----
App.prototype.runSummary = function(){
  if(this.screen!=='learn') return; var self=this;
  var learned=this.learned, best=this.bestCombo||0;
  var remainLessons=0; lessonsInBand(this.lesson.band).forEach(function(l){ if(!self.data.lessonsDone[l.idx] && l.idx!==self.lesson.idx) remainLessons++; });
  var goalLeft=Math.max(0, this.data.dailyGoal-(this.data.todayDate===todayStr()?this.data.todayCount:0));
  var nudge;
  if (goalLeft>0) nudge=goalLeft+' more word'+(goalLeft===1?'':'s')+' to reach today’s goal.';
  else if (remainLessons>0) nudge='Finish '+remainLessons+' more lesson'+(remainLessons===1?'':'s')+' to complete this milestone.';
  else nudge='You have completed this milestone. Beautiful work.';
  this.paint('<div style="width:100%;max-width:340px;display:flex;flex-direction:column;align-items:center;text-align:center;padding-top:14px;">'
    +'<div style="font-family:Poppins;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#9be3b8;">Lesson summary</div>'
    +'<div style="display:flex;gap:9px;width:100%;margin-top:16px;">'
      +[[learned,'learned'],[best,'best streak'],['+'+(learned*XP_PER_WORD+XP_PER_LESSON),'XP']].map(function(s){ return '<div style="flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(216,180,92,.2);border-radius:12px;padding:12px 6px;"><div style="font-family:Poppins;font-weight:700;font-size:22px;color:#78d9a0;">'+s[0]+'</div><div style="font-family:Poppins;font-size:9.5px;color:rgba(243,233,207,.5);margin-top:2px;">'+s[1]+'</div></div>'; }).join('')
    +'</div>'
    +'<div style="margin-top:18px;background:rgba(216,180,92,.08);border:1px solid rgba(216,180,92,.25);border-radius:14px;padding:14px 16px;font-family:Poppins;font-size:13px;color:#fbeeb8;line-height:1.5;">'+nudge+'</div>'
    +'<button class="ay-cta" id="sumNext" style="margin-top:22px;max-width:300px;"><span style="position:relative;z-index:2;">Continue &rarr;</span><span class="sh"></span></button>'
  +'</div>', 'Summary');
  this.q('#sumNext').onclick=function(){ self.celebrate(); };
};

// ---- practice (spaced, weak and due words) ----
App.prototype.dueForPractice = function(){
  var self=this, d=this.data.simDay||0;
  return this.learnedPool().filter(function(w){ var m=self.data.mastered[w.r]; return !m || m.pdue==null || m.pdue<=d; });
};
App.prototype.practiceCard = function(){
  var due=this.dueForPractice().length, day=this.data.simDay||0;
  var crowns=0, lv=this.data.lessonLevel||{}; for(var k in lv) crowns+=lv[k];
  var inner = due>0

    +'<div style="display:flex;align-items:center;justify-content:space-between;"><span style="font-family:Poppins;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:#9be3b8;">Practice</span><span style="font-family:Poppins;font-size:10.5px;color:rgba(243,233,207,.5);">&#128081; '+crowns+' crowns &middot; day '+day+'</span></div>'
    +inner
    +'<div style="display:flex;gap:8px;margin-top:10px;"><button class="ay-ghost" id="prStrong" style="flex:1;">Strengthen a lesson</button><button class="ay-ghost" id="prSim" style="flex:1;">Simulate next day</button></div>'
  +'</div>';
};
App.prototype.strengthenLesson = function(){
  for (var i=0;i<LESSONS.length;i++){ if(this.data.lessonsDone[LESSONS[i].idx]){ return this.go('learn',{lesson:LESSONS[i]}); } }
  this.go('home');
};
App.prototype.startPractice = function(){
  var self=this; var pool=this.dueForPractice(); if(!pool.length) pool=this.learnedPool();
  var qs=shuffle(pool).slice(0, Math.min(10,pool.length));
  this.reviseActive=true; this.nav.style.display='none';
  this.reviseChrome('Practice');
  var i=0, correct=0;
  function fin(){
    var d=self.data.simDay||0; qs.forEach(function(w){ var m=self.data.mastered[w.r]; if(m) m.pdue=d+2; }); self.save();
    var s=self.q('#rvStage'); if(!s) return; var pct=qs.length?Math.round(correct/qs.length*100):0;
    s.innerHTML='<div class="ay-fade" style="width:100%;max-width:340px;display:flex;flex-direction:column;align-items:center;text-align:center;padding-top:24px;">'
      +'<div style="font-family:\'Scheherazade New\',serif;font-size:42px;color:#eccb73;">آية</div>'
      +'<div style="margin-top:12px;font-size:48px;font-weight:700;color:#78d9a0;font-family:Poppins;">'+correct+'<span style="font-size:22px;color:rgba(243,233,207,.5);">/'+qs.length+'</span></div>'
      +'<div style="margin-top:8px;font-size:18px;font-weight:600;color:#fbeeb8;">'+(pct>=80?'Strong recall':'Good practice')+'</div>'
      +'<div style="font-family:Poppins;font-size:12px;color:rgba(243,233,207,.55);margin-top:8px;">These words return for practice in 2 days.</div>'
      +'<button class="ay-cta" id="prDone" style="margin-top:22px;max-width:300px;"><span style="position:relative;z-index:2;">Done</span><span class="sh"></span></button>'
    +'</div>';
    self.q('#prDone').onclick=function(){ self.reviseActive=false; self.go('home'); };
  }
  function ask(){
    if(i>=qs.length) return fin();
    var f=self.q('#rvFill'); if(f) f.style.width=(i/qs.length*100)+'%';
    var c=self.q('#rvCount'); if(c) c.textContent=(i+1)+'/'+qs.length;
    var w=qs[i]; var opts=self.engOptions(w,3);
    var s=self.q('#rvStage'); if(!s) return;
    s.innerHTML='<div class="ay-fade" style="width:100%;max-width:340px;display:flex;flex-direction:column;align-items:center;">'
      +'<div style="font-family:Poppins;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:rgba(243,233,207,.45);margin-bottom:10px;">What does this mean?</div>'
      +'<div style="font-family:\'Scheherazade New\',serif;font-size:'+self.arabicPx(58)+'px;color:#eccb73;direction:rtl;font-weight:700;">'+w.a+'</div>'
      +'<div style="display:flex;flex-direction:column;gap:10px;width:100%;margin-top:18px;">'
      +opts.map(function(o){ return '<button class="rvopt" data-en="'+esc(o)+'" style="width:100%;font-family:Poppins;background:#0f1932;border:1.5px solid rgba(216,180,92,.18);color:#f3e9cf;border-radius:14px;padding:15px 16px;cursor:pointer;font-size:16px;font-weight:500;text-align:center;">'+esc(o)+'</button>'; }).join('')
      +'</div></div>';
    var btns=$all('.rvopt',s), answered=false;
    btns.forEach(function(b){ b.onclick=function(){ if(answered)return; answered=true;
      var cb=btns.filter(function(x){return x.dataset.en===w.e;})[0];
      if(b.dataset.en===w.e){ b.style.borderColor='#50bb80'; b.style.background='rgba(80,187,128,.14)'; correct++; }
      else { b.style.borderColor='#cc5555'; b.style.background='rgba(204,85,85,.12)'; if(cb){cb.style.borderColor='#50bb80';cb.style.background='rgba(80,187,128,.14)';} }
      btns.forEach(function(x){ if(x!==b&&x!==cb) x.style.opacity='.4'; x.style.pointerEvents='none'; });
      i++; setTimeout(ask, 700);
    }; });
  }
  ask();
};

/* =====================================================================
   AYAH v1 INTEGRATION LAYER
   Lifts in, inside the existing app scope (App / VOCAB / LESSONS visible):
     1. Sequential reward animation: Step1 celebration -> Step2 root reveal
        -> Step3 character, strictly one at a time (never overlapping).
     2. Character guide system (AyahMascot) from the character-integration folder.
     3. Audio voweling fix (exact Harakat match on the surface form).
     4. Words-per-lesson setting (2-10) + 2.5% milestone bands.
   ===================================================================== */

// ---- small helpers (hoisted) ----
function fmtP(x){ x=Math.round(x*10)/10; return (x%1===0)? String(x) : x.toFixed(1); }
// Vowel-sensitive key: keeps Harakat/Tashkeel + dagger-alef, drops only decorative
// Quranic marks + tatweel and normalises alef-wasla, so an "exact" match means the
// SAME short vowels that are written on screen -> audio always matches the surface form.
function vkey(s){
  if(!s) return "";
  return String(s)
    .replace(/ـ/g,"")               // tatweel
    .replace(/[​-‏]/g,"")      // zero-width joiners / marks
    .replace(/ٱ/g,"ا")         // alef wasla -> plain alef
    .replace(/[ؐ-ؚ]/g,"")      // small high honorific signs
    .replace(/[ۖ-ۭ]/g,"")      // quranic annotation signs (sajdah/small letters)
    .trim();
}

/* ============ (3) AUDIO VOWELING FIX ============ */
App.prototype.exactWordIndex = function(verse, targetAr){
  if (!verse || !verse.words) return -1;
  var tk=vkey(targetAr);
  for (var i=0;i<verse.words.length;i++){ if (verse.words[i].ar===targetAr) return i; }   // identical glyphs
  for (var j=0;j<verse.words.length;j++){ if (vkey(verse.words[j].ar)===tk) return j; }    // same vowels
  return this.findWordIndex(verse, targetAr);                                              // last resort: consonants
};
App.prototype.wordAudio = function(w, verse){
  if (verse){ var i=this.exactWordIndex(verse, w.a); if (i>=0 && verse.words[i] && verse.words[i].audio && this.exactVowelHit(verse.words[i].ar, w.a)) return verse.words[i].audio; }
  return null;
};
App.prototype.exactVowelHit = function(found, target){ return vkey(found)===vkey(target); };
// Resolve a verse whose matched word carries the EXACT voweling of w.a, so its
// per-word audio_url pronounces the form shown on screen (inna != inni, kulla != kulli...).
App.prototype.bestVerse = function(w){
  var self=this;
  if (w._bv) return Promise.resolve(w._bv);
  if (w._bvP) return w._bvP;
  var SHORT_MAX=10, MIN_LEN=3, tvk=vkey(w.a);
  var exactIdx=function(v){
    if(!v||!v.words) return -1;
    for(var i=0;i<v.words.length;i++){ if(v.words[i].ar===w.a) return i; }
    for(var j=0;j<v.words.length;j++){ if(vkey(v.words[j].ar)===tvk) return j; }
    return -1;
  };
  var useRep=function(){
    return self.fetchVerse(w.s,w.v).then(function(v){
      var ex=exactIdx(v);
      if(ex>=0) return {verse:v, idx:ex, exact:true};
      var loose=self.findWordIndex(v,w.a);                 // consonant-only fallback
      return (loose>=0) ? {verse:v, idx:loose, exact:false} : null;
    }).catch(function(){ return null; });
  };
  var p = useRep().then(function(rep){
    if (rep && rep.exact && self.verseLen(rep.verse)<=SHORT_MAX) return rep;   // perfect & short
    var q=encodeURIComponent(stripDia(w.a));
    return fetch(API+"/search?q="+q+"&size=20&page=0").then(function(r){ if(!r.ok) throw 0; return r.json(); }).then(function(j){
      var results=(j.search && j.search.results) || [];
      var cands=[];
      results.forEach(function(rs){
        var toks=(rs.words||[]).filter(function(x){ return x.char_type!=='end'; });
        for (var i=0;i<toks.length;i++){ if (vkey(toks[i].text)===tvk){ cands.push({key:rs.verse_key, len:toks.length}); break; } }
      });
      cands=cands.filter(function(c){ return c.len>=MIN_LEN; }).sort(function(a,b){ return a.len-b.len; });
      if (!cands.length) return rep;                       // no exact-vowel verse anywhere -> keep rep
      var parts=cands[0].key.split(':'), s=+parts[0], v=+parts[1];
      return self.fetchVerse(s,v).then(function(vv){
        var idx=exactIdx(vv);
        return (idx>=0) ? {verse:vv, idx:idx, exact:true} : rep;
      }).catch(function(){ return rep; });
    }).catch(function(){ return rep; });
  }).then(function(res){ if(res) w._bv=res; w._bvP=null; return res; });
  w._bvP=p; return p;
};

];
function ayahGuideById(id){ for (var i=0;i<AYAH_GUIDES.length;i++){ if (AYAH_GUIDES[i].id===id) return AYAH_GUIDES[i]; } return AYAH_GUIDES[0]; }

function AyahMascot(){
  this.host=null; this.char=null; this.state='happy';
  this._blinkT=null; this._reactT=null; this._enterT=null;
  this.reduced = (window.matchMedia && matchMedia('(prefers-reduced-motion: reduce)').matches) || false;
}
AyahMascot.prototype.mount = function(parent, charId, pos){
  this.unmount();
  var host=document.createElement('div');
  host.className='ayg-host';
  host.setAttribute('aria-hidden','true');
  host.style.cssText=(pos||'top:30px;right:8px;');
  host.innerHTML =
    '<div class="ayg"><div class="ayg-enter"><div class="ayg-react"><div class="ayg-float"><div class="ayg-sway"><div class="ayg-breathe"><div class="ayg-pad">'
      +'<div class="ayg-halo"></div>'
      +'<img class="ayg-img" alt="">'
      +'<div class="ayg-eyes" style="position:absolute;inset:0;pointer-events:none;"></div>'
    +'</div></div></div></div></div></div></div>';
  parent.appendChild(host);
  this.host=host;
  this.elRoot=host.querySelector('.ayg');
  this.elEnter=host.querySelector('.ayg-enter');
  this.elReact=host.querySelector('.ayg-react');
  this.elImg=host.querySelector('.ayg-img');
  this.elEyes=host.querySelector('.ayg-eyes');
  this.elPad=host.querySelector('.ayg-pad');
  if (this.reduced) this.elRoot.classList.add('reduced');
  this.state='happy';
  this.setCharacter(charId);
  this.playEntrance();
  this.startBlink();
  return this;
};
AyahMascot.prototype.setCharacter = function(charId){
  this.char = ayahGuideById(charId || 'najma');
  this.elEyes.innerHTML=''; this._lids=[];
  var eyes=this.char.eyes;
  if (eyes && eyes.lids){
    for (var i=0;i<eyes.lids.length;i++){
      var L=eyes.lids[i]; var s=document.createElement('span'); s.className='ayg-eye';
      s.style.left=L[0]-L[2]/2+'%'; s.style.top=L[1]+'%'; s.style.width=L[2]+'%'; s.style.height=L[3]+'%';
      this.elEyes.appendChild(s); this._lids.push(s);
    }
  }
  this.applyArt();
};
AyahMascot.prototype.playEntrance = function(){
  if (this.reduced || !this.elRoot) return;
  var self=this, name='ent-'+(this.char.entrance||'swoop');
  this.elRoot.classList.add(name);
  clearTimeout(this._enterT);
  this._enterT=setTimeout(function(){ if(self.elRoot) self.elRoot.classList.remove(name); }, 1000);
};
AyahMascot.prototype.applyArt = function(){
  if (!this.char) return;
  var sad = this.state==='sad';
  var src = sad ? (this.char.sad || this.char.happy) : this.char.happy;
  if (this.elImg.getAttribute('src')!==src) this.elImg.setAttribute('src', src);
  this.elImg.alt = this.char.name + (sad ? ' looking sad' : ' looking happy');
  this.elRoot.classList.toggle('is-sad', sad);
  this.elRoot.classList.toggle('is-happy', !sad);
  this.elRoot.classList.toggle('has-sadart', sad && !!this.char.sad);
  var eyes=this.char.eyes;
  if (eyes && this._lids){
    var col = sad ? (eyes.sadColor||eyes.color) : eyes.color;
    for (var i=0;i<this._lids.length;i++) this._lids[i].style.background=col;
  }
};
AyahMascot.prototype.react = function(ok){
  if (!this.host) return;
  this.state = ok ? 'happy' : 'sad';
  this.applyArt();
  if (this.reduced) return;
  var layer=this.elReact;
  layer.classList.remove('cheer','droop'); void layer.offsetWidth;
  if (ok){ layer.classList.add('cheer'); this.sparkle(); } else { layer.classList.add('droop'); }
  clearTimeout(this._reactT);
  if (ok) this._reactT=setTimeout(function(){ if(layer) layer.classList.remove('cheer'); }, 960);
};
AyahMascot.prototype.sparkle = function(){
  if (this.reduced || !this.elPad) return;
  var n=10, root=this.elPad;
  for (var i=0;i<n;i++){ (function(k){
    var sp=document.createElement('span'); sp.className='ayg-spark';
    var ang=(-20 + Math.random()*220) * Math.PI/180, dist=22+Math.random()*22;
    sp.style.left=(28+Math.random()*44)+'%'; sp.style.top=(18+Math.random()*34)+'%';
    sp.style.setProperty('--dx', Math.cos(ang)*dist+'px');
    sp.style.setProperty('--dy', (Math.sin(ang)*dist - 16)+'px');
    sp.style.animationDelay=(k*50)+'ms';
    root.appendChild(sp);
    setTimeout(function(){ if(sp.parentNode) sp.parentNode.removeChild(sp); }, 1000+k*50);
  })(i); }
};
AyahMascot.prototype.startBlink = function(){
  var self=this;
  if (this.reduced || !this._lids || !this._lids.length) return;
  var loop=function(){
    if (!self.host) return;
    self._lids.forEach(function(l){ l.classList.add('blink'); });
    setTimeout(function(){ self._lids.forEach(function(l){ l.classList.remove('blink'); }); }, 120);
    if (Math.random()<0.25){ setTimeout(function(){ if(!self.host) return;
      self._lids.forEach(function(l){ l.classList.add('blink'); });
      setTimeout(function(){ self._lids.forEach(function(l){ l.classList.remove('blink'); }); }, 110); }, 230); }
    var sad=self.state==='sad';
    self._blinkT=setTimeout(loop, (sad?3200:2400) + Math.random()*2600);
  };
  this._blinkT=setTimeout(loop, 900+Math.random()*1400);
};
AyahMascot.prototype.unmount = function(){
  clearTimeout(this._blinkT); clearTimeout(this._reactT); clearTimeout(this._enterT);
  if (this.host && this.host.parentNode) this.host.parentNode.removeChild(this.host);
  this.host=null;
};

/* ============ (1) SEQUENTIAL REWARD ORCHESTRATOR ============ */
// Stable per-word character pick (same word -> same guide; never repeat in a row).
App.prototype.guideIdForWord = function(w){
  var key = w ? ('w'+w.r) : 'q';
  if (!this._guideForKey) this._guideForKey={};
  if (this._guideForKey[key]) return this._guideForKey[key];
  if (!this._guideDeck || this._guideDi>=this._guideDeck.length){
    var ids=shuffle(AYAH_GUIDES.map(function(g){ return g.id; }));
    if (this._guideLast && ids[0]===this._guideLast && ids.length>1){ ids.push(ids.shift()); }
    this._guideDeck=ids; this._guideDi=0;
  }
  var id=this._guideDeck[this._guideDi++]; this._guideLast=id;
  return (this._guideForKey[key]=id);
};
App.prototype.guideEnabled = function(){ return this.data && this.data.settings && this.data.settings.guide!==false; };
App.prototype.rootRevealEnabled = function(){ return !this.data || !this.data.settings || this.data.settings.rootReveal!==false; };

// Master sequence — runs one stage at a time, each starting only after the previous ends.
App.prototype.rewardSequence = function(w, done){
  var self=this;
  var finish=function(){ self._seqRunning=false; if(done) done(); };
  if (this._seqRunning){ finish(); return; }      // never run two sequences at once
  this._seqRunning=true;
  // STEP 1 — existing per-word celebration / any active custom celebration
  this.wordCelebrate(w, function(){
    if (self.screen!=='learn'){ finish(); return; }
    // STEP 2 — root reveal (reads w.rt), only after Step 1 has fully closed
    self.runRootReveal(w, function(){
      if (self.screen!=='learn'){ finish(); return; }
      // STEP 3 — character animation, only after Step 2 has fully finished
      self.runCharacterMoment(w, finish);
    });
  });
};

// STEP 2 — Linguistic Depth: reveal the 3-letter root one glyph at a time, RTL.
App.prototype.runRootReveal = function(w, done){
  var self=this;
  if (!this.rootRevealEnabled()){ done(); return; }
  var card=this.root.querySelector('.ay-card'); if(!card){ done(); return; }
  var reduced=(window.matchMedia && matchMedia('(prefers-reduced-motion: reduce)').matches);
  var ov=document.createElement('div');
  ov.className='ay-rootov';
  ov.style.cssText='position:absolute;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;background:rgba(4,9,31,.92);opacity:0;transition:opacity .22s ease;';

  if (w && w.rt){
    var letters=String(w.rt).split(/\s+/).filter(Boolean);
    var html='<div style="display:flex;flex-direction:column;align-items:center;text-align:center;padding:22px;">'
      +'<div style="font-family:Poppins;font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;color:#9be3b8;margin-bottom:13px;display:flex;align-items:center;gap:8px;">'
        +'<span style="width:16px;height:1px;background:linear-gradient(90deg,transparent,rgba(155,227,184,.8));"></span>'
        +'Linguistic depth &middot; root'
        +'<span style="width:16px;height:1px;background:linear-gradient(90deg,rgba(155,227,184,.8),transparent);"></span></div>'
      +'<div class="rootletters" style="display:flex;direction:rtl;gap:20px;align-items:center;justify-content:center;min-height:70px;">';
    letters.forEach(function(ch){ html+='<span class="rl" style="font-family:\'Scheherazade New\',serif;font-size:58px;font-weight:700;color:#eccb73;line-height:1;">'+ch+'</span>'; });
    html+='</div>'
      +'<div style="font-family:\'Scheherazade New\',serif;font-size:26px;color:#fbeeb8;direction:rtl;margin-top:14px;opacity:.9;">'+w.a+'</div>'
      +'<div style="font-family:Poppins;font-size:11px;color:rgba(243,233,207,.55);margin-top:8px;max-width:240px;">the letters this word is built from</div>'
      +'</div>';
    ov.innerHTML=html;
    card.appendChild(ov);
    var spans=Array.prototype.slice.call(ov.querySelectorAll('.rl'));
    requestAnimationFrame(function(){ ov.style.opacity='1'; });
    if (window.gsap && !reduced){
      gsap.set(spans,{opacity:0,scale:0.34,y:16});
      var tl=gsap.timeline();
      spans.forEach(function(s,i){
        var at=0.20 + i*0.30;
        tl.to(s,{opacity:1,scale:1,y:0,duration:0.6,ease:'back.out(2.2)'},at);
        tl.fromTo(s,{textShadow:'0 0 0 rgba(231,194,108,0)'},
          {textShadow:'0 0 30px rgba(231,194,108,.95), 0 0 56px rgba(231,194,108,.35)',duration:0.34,yoyo:true,repeat:1,ease:'sine.inOut'},at+0.16);
      });
      tl.add(function(){ spans.forEach(function(s){ s.style.animation='ayRootGlow 2.6s ease-in-out infinite'; }); });
    } else {
      spans.forEach(function(s,i){ s.style.opacity='0'; s.style.animation='ayRootPop .6s cubic-bezier(.16,1,.3,1) '+(0.18+i*0.28)+'s forwards, ayRootGlow 2.6s ease-in-out '+(0.9+i*0.28)+'s infinite'; });
    }
    var hold = reduced ? 900 : (700 + letters.length*340 + 700);
    setTimeout(function(){ ov.style.opacity='0'; setTimeout(function(){ if(ov.parentNode) ov.remove(); done(); },240); }, hold);
  } else {
    // particle / no triliteral root — short, graceful, non-breaking note
    ov.innerHTML='<div style="display:flex;justify-content:center;align-items:center;">'
      +'<span style="display:inline-flex;align-items:center;gap:9px;font-family:Poppins;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:rgba(243,233,207,.7);background:rgba(216,180,92,.07);border:1px solid rgba(216,180,92,.24);border-radius:999px;padding:9px 17px;">'
      +'<span style="width:5px;height:5px;border-radius:50%;background:#9be3b8;box-shadow:0 0 9px rgba(155,227,184,.9);"></span>'
      +'structural particle &middot; no root</span></div>';
    card.appendChild(ov);
    requestAnimationFrame(function(){ ov.style.opacity='1'; });
    setTimeout(function(){ ov.style.opacity='0'; setTimeout(function(){ if(ov.parentNode) ov.remove(); done(); },220); }, reduced?650:900);
  }
};

// STEP 3 — the word's character flies in, cheers with sparkles, then leaves.
App.prototype.runCharacterMoment = function(w, done){
  var self=this;
  if (!this.guideEnabled()){ done(); return; }
  var card=this.root.querySelector('.ay-card'); if(!card){ done(); return; }
  var reduced=(window.matchMedia && matchMedia('(prefers-reduced-motion: reduce)').matches);
  var ov=document.createElement('div');
  ov.className='ay-charov';
  ov.style.cssText='position:absolute;inset:0;z-index:51;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(4,9,31,.78);opacity:0;transition:opacity .2s ease;';
  var slot=document.createElement('div');
  slot.style.cssText='position:relative;width:200px;height:210px;display:flex;align-items:center;justify-content:center;';
  ov.appendChild(slot);
  card.appendChild(ov);
  this._charGuide=new AyahMascot();
  this._charGuide.mount(slot, this.guideIdForWord(w), 'position:absolute;inset:0;width:100%;height:100%;');
  requestAnimationFrame(function(){ ov.style.opacity='1'; });
  var cheerAt = reduced ? 60 : 720;     // let the entrance land first
  setTimeout(function(){ if(self._charGuide) self._charGuide.react(true); }, cheerAt);
  var hold = reduced ? 900 : 1850;
  setTimeout(function(){
    ov.style.opacity='0';
    setTimeout(function(){ if(self._charGuide){ self._charGuide.unmount(); self._charGuide=null; } if(ov.parentNode) ov.remove(); done(); }, 230);
  }, hold);
};

  // re-derive which lessons are complete from mastered words, so home/milestones stay correct
  var self=this, ld={};
  LESSONS.forEach(function(L){
    var all=L.words.length>0 && L.words.every(function(w){ return self.data.mastered[w.r]; });

  });
  this.data.lessonsDone=ld;
};
