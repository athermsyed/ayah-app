// Fetch a verse (words + translation) once; cache. Returns promise of {words:[{ar,audio}], tr, ref}
App.prototype.fetchVerse = function(s,v){
  var key = s+":"+v;
  if (this.verseCache[key]) return Promise.resolve(this.verseCache[key]);
  var self=this;
  var url = API+"/verses/by_key/"+key+"?words=true&word_fields=text_uthmani,audio_url&translations="+PICKTHALL+"&fields=text_uthmani";
  return fetch(url).then(function(r){ if(!r.ok) throw 0; return r.json(); }).then(function(j){
    var vs = j.verse || {};
    var words = (vs.words||[]).filter(function(w){ return w.char_type_name!=="end"; }).map(function(w){
      return { ar:(w.text_uthmani||w.text||""), audio:(w.audio_url||null), pos:w.position };
    });
    var tr = "";
    if (vs.translations && vs.translations[0]) tr = vs.translations[0].text.replace(/<sup[^>]*>.*?<\/sup>/g,"").trim();
    var obj = { words:words, tr:tr, s:s, v:v };
    self.verseCache[key]=obj; return obj;
  });
};

// Resolve a real verse that contains w as a whole word, preferring a SHORT verse so
// the ayah is easy to read and the learned word is easy to spot. The matched word's
// own audio_url is then authoritative for pronunciation. Result cached on w._bv.
App.prototype.verseLen = function(v){ return (v && v.words) ? v.words.length : 99; };
App.prototype.bestVerse = function(w){
  var self=this;
  if (w._bv) return Promise.resolve(w._bv);
  if (w._bvP) return w._bvP;
  var SHORT_MAX=10, MIN_LEN=3;
  var useRep=function(){
    return self.fetchVerse(w.s,w.v).then(function(v){
      var idx=self.findWordIndex(v,w.a);
      return (idx>=0) ? {verse:v, idx:idx} : null;
    }).catch(function(){ return null; });
  };
  var p = useRep().then(function(rep){
    if (rep && self.verseLen(rep.verse)<=SHORT_MAX) return rep;
    // Look for a shorter verse that contains the exact word form.
    var q=encodeURIComponent(stripDia(w.a));
    return fetch(API+"/search?q="+q+"&size=15&page=0").then(function(r){ if(!r.ok) throw 0; return r.json(); }).then(function(j){
      var results=(j.search && j.search.results) || [];
      var cands=[];
      results.forEach(function(rs){
        var toks=(rs.words||[]).filter(function(x){ return x.char_type!=='end'; });
        var exact=false, loose=false;
        for (var i=0;i<toks.length;i++){
          if (toks[i].text===w.a){ exact=true; break; }
          if (stripDia(toks[i].text)===stripDia(w.a)) loose=true;
        }
        if (exact||loose) cands.push({key:rs.verse_key, len:toks.length, exact:exact?1:0});
      });
      // Prefer a verse with the exact vowelled form (so pronunciation matches), then the shortest.
      cands=cands.filter(function(c){ return c.len>=MIN_LEN; }).sort(function(a,b){ return (b.exact-a.exact) || (a.len-b.len); });
      if (!cands.length) return rep;
      var parts=cands[0].key.split(':'), s=+parts[0], v=+parts[1];
      return self.fetchVerse(s,v).then(function(vv){
        var idx=self.exactWordIndex(vv,w.a);
        return (idx>=0) ? {verse:vv, idx:idx} : rep;
      }).catch(function(){ return rep; });
    }).catch(function(){ return rep; });
  }).then(function(res){ if(res) w._bv=res; w._bvP=null; return res; });
  w._bvP=p; return p;
};

function pad3(n){ n=String(n); return n.length>=3?n:('000'+n).slice(-3); }
App.prototype.findWordIndex = function(verse, targetAr){
  // Exact (diacritic-insensitive) whole-word match only. A loose prefix match used
  // to return the wrong word, which is why some audio clips did not match the word.
  if (!verse || !verse.words) return -1;
  var t = stripDia(targetAr);
  for (var i=0;i<verse.words.length;i++){ if (stripDia(verse.words[i].ar)===t){ return i; } }
  return -1;
};
App.prototype.exactWordIndex = function(verse, targetAr){
  // Prefer the exact vowelled form so the chosen word's audio matches the taught form;
  // fall back to the diacritic-insensitive match otherwise.
  if (!verse || !verse.words) return -1;
  for (var i=0;i<verse.words.length;i++){ if (verse.words[i].ar===targetAr){ return i; } }
  return this.findWordIndex(verse, targetAr);
};
App.prototype.wordAudio = function(w, verse){
  // Only ever return the verse's own authoritative per-word audio_url for an exact
  // match. Never build a URL from the word position: Quran.com audio file numbers do
  // not equal word positions, so that produced the wrong recitation.
  if (verse){ var i=this.findWordIndex(verse, w.a); if (i>=0 && verse.words[i].audio) return verse.words[i].audio; }
  return null;
};

  this.lwords.forEach(function(w,wi){ self.STAGES.forEach(function(st){ self.queue.push({wi:wi,stage:st,isRetry:false}); }); });
  this.lphase='learn'; this._celebrated=false; this.learned=0; this.sessionCorrect=0; this.sessionLearnedRanks=[]; this.fillIdx=0; this.ayahShown=false; this._learnedWi={}; this.combo=0; this.bestCombo=0; this.lessonMissed={};
  // prefetch verses for the lesson words (live enrichment)
  this.lwords.forEach(function(w){ self.fetchVerse(w.s,w.v).catch(function(){}); });

App.prototype.setProgress = function(){
  var total=this.lwords.length*((this.STAGES&&this.STAGES.length)||1);
  var remaining=this.queue.filter(function(q){return !q.isRetry;}).length;
  var pct;
  if (this.lphase==='learn') pct=((total-remaining)/total)*58;
  else if (this.lphase==='pairs') pct=62;
  else if (this.lphase==='ayah') pct=68;
  else if (this.lphase==='build') pct=72;
  else if (this.lphase==='fill') pct=76+(this.fillIdx/Math.max(1,this.fills?this.fills.length:1))*6;
  else if (this.lphase==='mastercheck') pct=84+(Object.keys(this.mcDone||{}).length/Math.max(1,this.mcTotal||1))*10;
  else if (this.lphase==='summary') pct=97;
  else pct=100;
  var f=this.q('#lnFill'); if(f) f.style.width=Math.min(100,Math.max(0,pct))+'%';
  var c=this.q('#lnCount'); if(c) c.textContent=this.lphase==='learn'?this.learned+'/'+this.lwords.length:(this.lphase==='done'?'✓':'•');
};

App.prototype.next = function(){
  if (this.lphase==='learn') return this.runQueued();
  if (this.lphase==='pairs') return this.runPairs();
  if (this.lphase==='ayah') return this.runAyah();
  if (this.lphase==='build') return this.runBuild();
  if (this.lphase==='fill') return this.runFill();
  if (this.lphase==='mastercheck') return this.runMasterCheck();
  if (this.lphase==='summary') return this.runSummary();
  return this.celebrate();
};
App.prototype.runQueued = function(){
  if (this.screen!=='learn') return;
  if (this.queue.length===0){ this.lphase='pairs'; return this.next(); }
  var item=this.queue.shift(); var w=this.lwords[item.wi];
  var rb = item.isRetry ? '<div style="width:100%;max-width:340px;background:rgba(216,180,92,.08);border:1px solid rgba(216,180,92,.25);border-radius:10px;padding:8px 14px;font-family:Poppins;font-size:12px;color:#eccb73;text-align:center;margin-bottom:12px;">&#8617; Reviewing <span style="font-family:\'Scheherazade New\',serif;font-size:18px;">'+w.a+'</span></div>' : '';
  if (item.stage==='introduce') return this.scIntroduce(w);
  if (item.stage==='recall') return this.scRecall(w,rb);
  if (item.stage==='pickAr') return this.scPickAr(w,rb);
  if (item.stage==='pickEn') return this.scPickEn(w,rb);
  if (item.stage==='listen') return this.scListen(w,rb);
  if (item.stage==='type') return this.scType(w,rb);
};
App.prototype.scheduleRetry = function(wi){
  this.queue=this.queue.filter(function(q){ return !(q.wi===wi && q.isRetry); });
  var at=Math.min(this.queue.length, 2+Math.floor(Math.random()*2));
  this.queue.splice(at,0,{wi:wi,stage:'recall',isRetry:true},{wi:wi,stage:'pickEn',isRetry:true});
};
App.prototype.afterCorrect = function(wi){
  if (this.screen!=='learn') return;
  var w=this.lwords[wi];
  this.sessionCorrect++;
  var remaining=this.queue.filter(function(q){ return q.wi===wi && !q.isRetry; });
  if (remaining.length===0){
    var self=this;
    // Each word is counted and celebrated at most once per lesson. A re-queued retry
    // that is later answered correctly is a review, not a new completion, so the
    // "learned" count can never exceed the number of words in the lesson.
    if (this._learnedWi && this._learnedWi[wi]) return this.next();
    (this._learnedWi=this._learnedWi||{})[wi]=true;
    this.learned++;
    if (!this.data.mastered[w.r]){
      this.data.mastered[w.r]={conf:1,seen:1,correct:1};
      this.data.wordsMastered++;
      this.data.xp+=XP_PER_WORD;
      this.sessionLearnedRanks.push(w.r);
      this.bumpDaily();
      this.save();
    }
    this.wordCelebrate(w, function(){ self.next(); });
  } else this.next();
};
App.prototype.distractors = function(field, w, n){
  var pool=this.lwords.filter(function(x){ return x[field]!==w[field]; });
  if (pool.length<n) pool=pool.concat(VOCAB.filter(function(x){ return x[field]!==w[field] && pool.indexOf(x)<0; }));
  return shuffle(pool).slice(0,n);
};

    this.parts.push({kind:'rletter',glyph:GLYPHS[Math.floor(Math.random()*GLYPHS.length)],x:x0+Math.random()*b.width,y:y0+2+Math.random()*4,vy:rise,sway:.3+Math.random()*.5,phase:Math.random()*6.28,size:17+Math.random()*9,dot:1.6+Math.random()*1.2,rot:(Math.random()-.5)*26,vr:(Math.random()-.5)*.7,age:0,shrink:30+Math.random()*22,alpha:0,amax:.85+Math.random()*.15,fading:false}); }
};
App.prototype.loop = function(){
  var ctx=this.ctx; if(!ctx){ return; } ctx.clearRect(0,0,this.cw,this.ch);
  if (this.riseOn){ this.riseAcc++; if(this.riseAcc>6){ this.riseAcc=0; this.spawnRise(); } }
  var dots=0, self=this;
  for (var i=this.parts.length-1;i>=0;i--){ var p=this.parts[i];
    if (p.kind==='letter'){ p.vx*=.975; p.vy=p.vy*.975+.035; p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr; p.age++;
      if (p.age>p.shrink){ p.size+=(p.dot-p.size)*.07; if(p.size<=p.dot+.5){ p.kind='dot'; p.glyph=null; p.size=p.dot; p.vx=(Math.random()-.5)*.3; p.vy=-.05-Math.random()*.12; p.alpha=p.amax=.45+Math.random()*.35; } } }
    else if (p.kind==='rletter'){ p.phase+=.05; p.age++; p.y+=p.vy; p.x+=Math.sin(p.phase)*p.sway; p.rot+=p.vr;
      if (!p.fading&&p.alpha<p.amax) p.alpha=Math.min(p.amax,p.alpha+.07);
      if (p.glyph&&p.age>p.shrink){ p.size+=(p.dot-p.size)*.08; if(p.size<=p.dot+.5){ p.glyph=null; p.size=p.dot; } }
      if (p.y<this.ch*.24){ p.fading=true; p.alpha-=.018; }
      if (p.alpha<=0||p.y<8||p.size<.4){ this.parts.splice(i,1); continue; } }
    else if (p.kind==='dot'){ dots++; p.phase+=.02; p.x+=p.vx+Math.sin(p.phase)*.16; p.y+=p.vy; if(p.y<-12){ p.y=this.ch+12; p.x=Math.random()*this.cw; } if(p.x<-12)p.x=this.cw+12; if(p.x>this.cw+12)p.x=-12; }
    this.drawPart(ctx,p);
  }
  if (dots>40){ for(var j=0;j<this.parts.length&&dots>40;j++){ if(this.parts[j].kind==='dot'){ this.parts.splice(j,1); dots--; j--; } } }
  this.raf=requestAnimationFrame(function(){ self.loop(); });
};
App.prototype.drawPart = function(ctx,p){
  if (p.glyph){ var fl=p.alpha*(.7+.3*Math.sin(p.phase)); ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot*Math.PI/180); ctx.font=p.size.toFixed(1)+"px 'Scheherazade New', serif"; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.shadowColor='rgba(231,194,108,.9)'; ctx.shadowBlur=8; ctx.fillStyle='rgba(245,224,160,'+Math.max(0,fl)+')'; ctx.fillText(p.glyph,0,0); ctx.restore(); }
  else { var fl2=p.kind==='dot'?p.alpha*(.55+.45*Math.sin(p.phase*1.7)):p.alpha; ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,6.2832); ctx.fillStyle='rgba(245,224,160,'+Math.max(0,fl2)+')'; ctx.shadowColor='rgba(231,194,108,.95)'; ctx.shadowBlur=7; ctx.fill(); }
  ctx.shadowBlur=0;
};

function normAns(s){ return String(s||'').toLowerCase().replace(/[^a-z\s]/g,' ').replace(/\s+/g,' ').trim(); }

App.prototype.learnedPool = function(){
  var self=this;
  return VOCAB.filter(function(w){ return !!self.data.mastered[w.r]; });
};
App.prototype.lessonsCompletedCount = function(){ var n=0,k; for (k in this.data.lessonsDone){ if(this.data.lessonsDone[k]) n++; } return n; };
App.prototype.matchMeaning = function(input, meaning){
  var inp=normAns(input); if(!inp) return false;
  var alts=String(meaning).split('/').map(function(a){ return normAns(a); });
  var exp=[];
  alts.forEach(function(a){ if(a) exp.push(a); var b=a.replace(/^(the|a|an|to|and)\s+/,''); if(b&&b!==a) exp.push(b); });
  for (var i=0;i<exp.length;i++){ var e=exp[i]; if(!e) continue;
    if (inp===e) return true;
    if (inp.length>=3 && e.indexOf(inp)>=0) return true;
    if (e.length>=3 && inp.indexOf(e)>=0) return true;
  }
  return false;
};
App.prototype.engOptions = function(w, n){
  var pool=this.learnedPool().filter(function(x){ return x.e!==w.e; });
  if (pool.length<n) pool=pool.concat(VOCAB.filter(function(x){ return x.e!==w.e; }));
  var seen={}, uniq=[];
  shuffle(pool).forEach(function(x){ if(!seen[x.e]){ seen[x.e]=1; uniq.push(x); } });
  var picks=uniq.slice(0,n).map(function(x){ return x.e; });
  return shuffle([w.e].concat(picks));
};

      else { b.style.borderColor='#cc5555'; b.style.background='rgba(204,85,85,.12)'; if(cb){cb.style.borderColor='#50bb80';cb.style.background='rgba(80,187,128,.14)';} }
      btns.forEach(function(x){ if(x!==b&&x!==cb) x.style.opacity='.4'; x.style.pointerEvents='none'; });
      i++; setTimeout(ask, 700);
    }; });
  }
  ask();
};

// boot
if (document.readyState==='loading') document.addEventListener('DOMContentLoaded', function(){ window._ayah = new App(); });
else window._ayah = new App();
})();
</script>
